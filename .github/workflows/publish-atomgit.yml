name: publish-atomgit

on:
  workflow_run:
    workflows: ['Release']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-atomgit:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set git user
        run: |
          git config --global user.name "xiaojunnuo"
          git config --global user.email "xiaojunnuo@qq.com"

      - name: Get version
        id: get_version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download release assets
        id: download_assets
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ]; then
            echo "Release $TAG not found"
            exit 1
          fi

          mkdir -p release-assets

          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets")

          echo "$ASSETS" | jq -r '.[].browser_download_url' | while read url; do
            echo "Downloading $url"
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -o "release-assets/$(basename "$url")" "$url"
          done

          ls -la release-assets/

      - name: Push to atomgit
        run: |
          git remote add atomgit https://greper:${{ secrets.ATOMGIT_TOKEN }}@atomgit.com/certd/jks-go
          git push atomgit main --tags --force

      - name: Get changelog
        id: get_changelog
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CONTENT=$(git log --pretty=format:"- %s" "$PREV_TAG..$TAG" | head -50)
          else
            CONTENT=$(git log --pretty=format:"- %s" "$TAG" | head -50)
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create atomgit release
        id: atomgit_release
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="v${VERSION}"
          CONTENT="${{ steps.get_changelog.outputs.content }}"

          JSON_BODY=$(jq -n \
            --arg tag "$TAG" \
            --arg name "$TAG" \
            --arg body "$CONTENT" \
            --arg target "main" \
            '{tag_name: $tag, name: $name, body: $body, target_commitish: $target}')

          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY" \
            "https://api.atomgit.com/api/v5/repos/certd/jks-go/releases?access_token=${{ secrets.ATOMGIT_TOKEN }}")

          echo "$RESPONSE"

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ]; then
            echo "Failed to create atomgit release"
            exit 1
          fi

          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload assets to atomgit
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="v${VERSION}"

          for file in release-assets/*; do
            filename=$(basename "$file")
            echo "Uploading $filename ..."

            UPLOAD_RESPONSE=$(curl -s -X GET \
              "https://api.atomgit.com/api/v5/repos/certd/jks-go/releases/$TAG/upload_url?access_token=${{ secrets.ATOMGIT_TOKEN }}&file_name=$filename")

            UPLOAD_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.url // empty')

            if [ -z "$UPLOAD_URL" ]; then
              echo "Failed to get upload URL for $filename"
              echo "$UPLOAD_RESPONSE"
              continue
            fi

            UPLOAD_HEADERS=$(echo "$UPLOAD_RESPONSE" | jq -r '.headers // {}')

            CONTENT_LENGTH=$(wc -c < "$file")

            curl -s -X PUT \
              -H "Content-Length: $CONTENT_LENGTH" \
              --data-binary "@$file" \
              "$UPLOAD_URL"

            echo "  done"
          done

          echo "All assets uploaded to atomgit release"
