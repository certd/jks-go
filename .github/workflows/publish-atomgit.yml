name: publish-atomgit

on:
  workflow_run:
    workflows: ['Release']
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (without v prefix)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-atomgit:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set git user
        run: |
          git config --global user.name "xiaojunnuo"
          git config --global user.email "xiaojunnuo@qq.com"

      - name: Get version
        id: get_version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download release assets from GitHub
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"

          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ]; then
            echo "Release $TAG not found"
            exit 1
          fi

          mkdir -p dist

          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets")

          echo "$ASSETS" | jq -r '.[] | "\(.id) \(.name)"' | while read id name; do
            echo "Downloading $name ..."
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              -o "dist/$name" \
              "https://api.github.com/repos/${{ github.repository }}/releases/assets/$id"
            ls -la "dist/$name"
          done

      - name: Push code to atomgit
        run: |
          git remote add atomgit https://greper:${{ secrets.ATOMGIT_TOKEN }}@atomgit.com/certd/jks-go
          git push atomgit main --tags --force

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Publish release to atomgit
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
          ASSETS_DIR: ../dist
        run: node publish-atomgit.js
        working-directory: scripts
