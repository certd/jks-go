name: publish-atomgit

on:
  workflow_run:
    workflows: ['Release']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-atomgit:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set git user
        run: |
          git config --global user.name "xiaojunnuo"
          git config --global user.email "xiaojunnuo@qq.com"

      - name: Get version
        id: get_version
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download release assets
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          RELEASE_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
            | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ]; then
            echo "Release $TAG not found"
            exit 1
          fi

          mkdir -p release-assets

          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets")

          echo "$ASSETS" | jq -r '.[].browser_download_url' | while read url; do
            echo "Downloading $url"
            curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -o "release-assets/$(basename "$url")" "$url"
          done

          ls -la release-assets/

      - name: Push to atomgit
        run: |
          git remote add atomgit https://greper:${{ secrets.ATOMGIT_TOKEN }}@atomgit.com/certd/jks-go
          git push atomgit main --tags --force

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Publish to atomgit
        env:
          ATOMGIT_TOKEN: ${{ secrets.ATOMGIT_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
          ASSETS_DIR: ../release-assets
        run: node publish-atomgit.js
        working-directory: scripts
